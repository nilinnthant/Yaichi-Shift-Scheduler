<style>
  :root{
    --bg:#f5efdf;
    --panel:#fbf7ec;
    --panel2:#efe3c4;
    --line:#d8c6a0;
    --text:#2c2a52;
    --muted:#8a7a5c;
    --accent:#8c3a3a;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body,.wrap{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    margin:0;
    padding:0;
  }
  .wrap{padding:18px 14px 40px;}
  h1{
    font-size:19px;
    margin:0 0 2px;
    letter-spacing:.2px;
    font-weight:700;
    color:var(--text);
  }
  .sub{
    color:var(--accent);
    font-size:12.5px;
    margin:0 0 16px;
    line-height:1.5;
  }

  /* ---- version bar ---- */
  .version-bar{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .version-select-wrap{
    position:relative;
    display:inline-block;
  }
  .version-select{
    appearance:none;
    -webkit-appearance:none;
    background:var(--panel);
    border:1px solid var(--accent);
    color:var(--text);
    font-size:13px;
    font-weight:600;
    padding:8px 30px 8px 12px;
    border-radius:8px;
    cursor:pointer;
    min-width:140px;
  }
  .version-select-wrap::after{
    content:'';
    position:absolute;
    right:11px;
    top:50%;
    width:7px;
    height:7px;
    border-right:2px solid var(--muted);
    border-bottom:2px solid var(--muted);
    transform:translateY(-70%) rotate(45deg);
    pointer-events:none;
  }
  .version-name-input{
    background:var(--panel);
    border:1px solid var(--accent);
    color:var(--text);
    font-size:13px;
    font-weight:600;
    padding:8px 10px;
    border-radius:8px;
    min-width:120px;
  }
  .version-btn{
    background:transparent;
    border:1px dashed var(--line);
    color:var(--muted);
    font-size:12.5px;
    font-weight:600;
    padding:7px 12px;
    border-radius:8px;
    cursor:pointer;
    white-space:nowrap;
  }
  .version-btn:hover{color:var(--text);border-color:var(--accent);}
  .version-btn.danger:hover{color:#b23b3b;border-color:#b23b3b;}
  .undo-btn{
    background:var(--panel);
    border:1px solid var(--accent);
    color:var(--text);
    font-size:12.5px;
    font-weight:600;
    padding:7px 12px;
    border-radius:8px;
    cursor:pointer;
    white-space:nowrap;
  }
  .undo-btn:disabled{opacity:.45; cursor:default;}

  /* ---- entry editor ---- */
  .entry-panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    margin-bottom:16px;
  }
  .entry-shift{
    padding:10px 0;
    border-bottom:1px solid var(--line);
  }
  .entry-shift:last-of-type{border-bottom:none;}
  .entry-shift-head{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:8px;
  }
  .entry-dot{
    width:14px;height:14px;
    border-radius:4px;
    flex:0 0 auto;
  }
  .entry-label-input{
    background:var(--bg);
    border:1px solid var(--line);
    color:var(--text);
    font-size:13px;
    font-weight:700;
    padding:5px 8px;
    border-radius:6px;
    width:64px;
  }
  .entry-shift-remove{
    margin-left:auto;
    background:transparent;
    border:1px solid var(--line);
    color:var(--muted);
    font-size:11px;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
  }
  .entry-shift-remove:hover{color:#b23b3b;border-color:#b23b3b;}
  .entry-row{
    display:flex;
    align-items:center;
    gap:6px;
    margin:6px 0;
    flex-wrap:wrap;
  }
  .entry-row input[type="time"]{
    background:var(--bg);
    border:1px solid var(--line);
    color:var(--text);
    font-size:13px;
    padding:6px 8px;
    border-radius:6px;
  }
  .entry-row .dash{color:var(--muted); font-size:12px;}
  .entry-row-remove{
    background:transparent;
    border:1px solid var(--line);
    color:var(--muted);
    width:24px;height:24px;
    border-radius:50%;
    cursor:pointer;
    font-size:12px;
  }
  .entry-row-remove:hover{color:#b23b3b;border-color:#b23b3b;}
  .entry-add-time{
    background:transparent;
    border:1px dashed var(--line);
    color:var(--muted);
    font-size:11.5px;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
    margin-top:2px;
  }
  .entry-add-time:hover{color:var(--text);border-color:var(--accent);}
  .entry-add-shift{
    background:transparent;
    border:1px dashed var(--line);
    color:var(--muted);
    font-size:12.5px;
    font-weight:600;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    margin-top:6px;
  }
  .entry-add-shift:hover{color:var(--text);border-color:var(--accent);}

  /* ---- calendar (read-only visual) ---- */
  .day{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px;
    width:100%;
  }
  .day-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:10px;
  }
  .day-head h2{
    font-size:15px;
    margin:0;
    font-weight:700;
    color:var(--text);
  }
  .day-head span{
    font-size:11px;
    color:var(--muted);
  }
  .grid-area{
    display:flex;
  }
  .gutter{
    width:52px;
    flex:0 0 auto;
    position:relative;
  }
  .gutter .lab{
    position:absolute;
    right:6px;
    transform:translateY(-50%);
    font-size:10px;
    color:var(--muted);
    white-space:nowrap;
  }
  .shift-cols{
    display:flex;
    gap:6px;
    flex:1 1 auto;
    overflow-x:auto;
  }
  .shift-col{
    flex:0 0 84px;
    display:flex;
    flex-direction:column;
  }
  .shift-head{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:4px;
  }
  .shift-label{
    font-size:12px;
    font-weight:700;
    padding:2px 6px;
    border-radius:6px;
    color:#2c2a52;
  }
  .track{
    position:relative;
    background:repeating-linear-gradient(
      to bottom,
      var(--panel2) 0,
      var(--panel2) 14px,
      var(--line) 14px,
      var(--line) 15px
    );
    border-radius:6px;
    border:1px solid var(--line);
  }
  .hour-line{
    position:absolute;
    left:0;right:0;
    border-top:1px solid #b89b66;
    pointer-events:none;
  }
  .block{
    position:absolute;
    left:3px;right:3px;
    border-radius:6px;
    font-size:10px;
    font-weight:700;
    color:#0f1720;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:2px;
    box-shadow:0 1px 3px rgba(0,0,0,.25);
    line-height:1.15;
  }
  .break-seg{
    position:absolute;
    left:3px;right:3px;
    border-radius:6px;
    font-size:9.5px;
    font-weight:700;
    color:var(--muted);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    pointer-events:none;
    background-image:repeating-linear-gradient(
      45deg,
      var(--panel2) 0px,
      var(--panel2) 6px,
      var(--line) 6px,
      var(--line) 12px
    );
  }
  .shift-stats{
    margin-top:6px;
    font-size:10.5px;
    color:var(--muted);
    text-align:center;
    line-height:1.5;
  }
  .shift-stats b{color:var(--text);}
  .shift-stats .lbl{color:var(--muted);}

  .print-btn{
    display:block;
    margin:18px auto 0;
    background:var(--panel);
    border:1px solid var(--accent);
    color:var(--accent);
    font-size:13px;
    font-weight:700;
    padding:9px 18px;
    border-radius:8px;
    cursor:pointer;
  }
  .print-btn:hover{background:var(--accent); color:var(--panel);}

  .print-area{ display:none; }

  @media print{
    body *{ visibility:hidden; }
    .print-area, .print-area *{ visibility:visible; }
    .print-area{
      display:block;
      position:absolute;
      top:0; left:0;
      width:100%;
      font-family:'Courier New', Courier, monospace;
      font-size:12px;
      color:#000;
      padding:6px;
    }
    .print-area h2{
      font-size:14px;
      text-align:center;
      margin:0 0 4px;
      letter-spacing:.05em;
    }
    .print-area .rule{
      border-top:1px dashed #000;
      margin:6px 0;
    }
    .print-area .shift-block{ margin-bottom:8px; }
    .print-area .shift-block .name{ font-weight:700; }
    .print-area .shift-block .line{ margin-left:8px; }
    .print-area .totals{ margin-top:4px; font-weight:700; }
  }
</style>

<div class="wrap">
  <h1>Weekend Shift Template</h1>
  <p class="sub">Enter start and end times for each shift below and the calendar draws itself. A gap between two entries in the same column is automatically counted as break time. Anyone with this link can view and edit — changes sync live to everyone else with the page open.</p>

  <div id="versionBar" class="version-bar"></div>
  <div id="entryEditor" class="entry-panel"></div>
  <div id="dayContainer"></div>
  <button id="printBtn" class="print-btn">🖨 Print schedule</button>
  <div id="printArea" class="print-area"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
(function(){
  const START_MIN = 8*60;      // 8:00 AM
  const END_MIN   = 24*60;     // 12:00 AM
  const STEP      = 30;        // minutes per row
  const ROWS      = (END_MIN-START_MIN)/STEP;
  const ROW_H     = 15;        // px

  const PALETTE = ['#2dd4bf','#e94f8a','#ff7a59','#5b9dff','#c084fc','#ffd166','#8ee08e'];

  let uid = 1;
  const newId = () => 'id'+(uid++);

  function nextLabel(shifts){
    const used = new Set(shifts.map(s=>s.label));
    for(let i=0;i<26;i++){
      const L = String.fromCharCode(65+i);
      if(!used.has(L)) return L;
    }
    return 'X'+shifts.length;
  }

  function defaultShifts(){
    return [
      { id:newId(), label:'A', color:PALETTE[0], blocks:[] },
      { id:newId(), label:'B', color:PALETTE[1], blocks:[] },
      { id:newId(), label:'C', color:PALETTE[2], blocks:[] },
    ];
  }

  function cloneShifts(shifts){
    return shifts.map(s => ({
      id:newId(),
      label:s.label,
      color:s.color,
      blocks: s.blocks.map(b => ({ id:newId(), start:b.start, end:b.end }))
    }));
  }

  const state = {
    versions: [ { id:newId(), name:'Idea 1', shifts: defaultShifts() } ],
    activeVersion: 0
  };

  function currentShifts(){
    return state.versions[state.activeVersion].shifts;
  }

  // ---- persistence + live cross-device sync via Firebase ----
  const firebaseConfig = {
    apiKey: "AIzaSyCplEuLz_uxe2l2G5yQlpgEw2qLf5CNZfI",
    authDomain: "yaichi-shift-scheduler.firebaseapp.com",
    databaseURL: "https://yaichi-shift-scheduler-default-rtdb.firebaseio.com",
    projectId: "yaichi-shift-scheduler",
    storageBucket: "yaichi-shift-scheduler.firebasestorage.app",
    messagingSenderId: "26090414251",
    appId: "1:26090414251:web:5b78bf102373fddb5e57ee"
  };
  firebase.initializeApp(firebaseConfig);
  const dbRef = firebase.database().ref('shiftSchedule/state');

  let suppressSave = false;
  let saveTimer = null;

  function scheduleSave(){
    if(suppressSave) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      dbRef.set({ versions: state.versions, activeVersion: state.activeVersion }).catch(()=>{});
    }, 400);
  }

  function listenForRemoteChanges(){
    dbRef.on('value', snapshot => {
      const val = snapshot.val();
      if(!val || !Array.isArray(val.versions) || !val.versions.length) return;
      const incoming = JSON.stringify({ versions: val.versions, activeVersion: val.activeVersion });
      const current = JSON.stringify({ versions: state.versions, activeVersion: state.activeVersion });
      if(incoming === current) return;
      suppressSave = true;
      state.versions = val.versions;
      state.activeVersion = Math.min(val.activeVersion || 0, val.versions.length-1);
      render();
      suppressSave = false;
    });
  }

  // ---- undo ----
  const UNDO_LIMIT = 50;
  let undoStack = [];
  function pushHistory(){
    undoStack.push(JSON.stringify({ versions: state.versions, activeVersion: state.activeVersion }));
    if(undoStack.length > UNDO_LIMIT) undoStack.shift();
  }
  function undo(){
    if(undoStack.length === 0) return;
    const parsed = JSON.parse(undoStack.pop());
    state.versions = parsed.versions;
    state.activeVersion = parsed.activeVersion;
    render();
  }

  function minutesLabel(totalMin){
    let h = Math.floor(totalMin/60), m = totalMin%60;
    let ampm = 'AM';
    if(h===24){ h=12; ampm='AM'; }
    else if(h===12){ ampm='PM'; }
    else if(h>12){ h=h-12; ampm='PM'; }
    else if(h===0){ h=12; ampm='AM'; }
    return h + (m? (':'+String(m).padStart(2,'0')) : '') + ' ' + ampm;
  }

  function fmtHours(rows){
    const hrs = rows*STEP/60;
    return (Math.round(hrs*100)/100).toString().replace(/\.0$/,'') + 'h';
  }

  function rowToTimeValue(row){
    const total = START_MIN + row*STEP;
    const h = Math.floor(total/60) % 24;
    const m = total % 60;
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  }

  // Accepts things like "11:00 AM", "11am", "2pm", "14:30", "9:00"
  function parseTimeToMinutes(str){
    if(!str) return null;
    const s = str.trim().toUpperCase();
    let m = s.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)?$/) || s.match(/^(\d{1,2})\s*(AM|PM)$/);
    if(!m) return null;
    let hh, mm, ap;
    if(m.length === 4){ hh = parseInt(m[1],10); mm = parseInt(m[2],10); ap = m[3]; }
    else { hh = parseInt(m[1],10); mm = 0; ap = m[2]; }
    if(ap === 'AM'){ if(hh === 12) hh = 0; }
    else if(ap === 'PM'){ if(hh !== 12) hh += 12; }
    if(hh < 0 || hh > 23 || mm < 0 || mm > 59) return null;
    return hh*60 + mm;
  }

  function timeValueToRow(value){
    const total0 = parseTimeToMinutes(value);
    if(total0 === null) return null;
    let total = total0;
    if(total < START_MIN) total += 24*60; // handle times that read as "past midnight"
    let row = Math.round((total - START_MIN) / STEP);
    return Math.max(0, Math.min(ROWS, row));
  }

  function neighborBounds(shift, blockId, start, end){
    let minBound = 0, maxBound = ROWS;
    shift.blocks.forEach(o => {
      if(o.id===blockId) return;
      if(o.end<=start) minBound = Math.max(minBound, o.end);
      if(o.start>=end) maxBound = Math.min(maxBound, o.start);
    });
    return {minBound, maxBound};
  }

  function getBreakSegments(shift){
    const sorted = [...shift.blocks].sort((a,b) => a.start-b.start);
    const segs = [];
    for(let i=0;i<sorted.length-1;i++){
      const gapStart = sorted[i].end, gapEnd = sorted[i+1].start;
      if(gapEnd > gapStart) segs.push({start:gapStart, end:gapEnd});
    }
    return segs;
  }

  function shiftHours(shift){
    let work = 0;
    shift.blocks.forEach(b => { work += (b.end-b.start); });
    let brk = 0;
    getBreakSegments(shift).forEach(seg => { brk += (seg.end-seg.start); });
    return {work, brk};
  }

  // ---------------- version bar ----------------
  function renderVersionTabs(){
    const bar = document.getElementById('versionBar');
    bar.innerHTML = '';

    const selectWrap = document.createElement('div');
    selectWrap.className = 'version-select-wrap';
    const select = document.createElement('select');
    select.className = 'version-select';
    state.versions.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = v.name;
      if(i === state.activeVersion) opt.selected = true;
      select.appendChild(opt);
    });
    select.addEventListener('change', () => {
      state.activeVersion = parseInt(select.value, 10);
      render();
    });
    selectWrap.appendChild(select);
    bar.appendChild(selectWrap);

    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.className = 'version-name-input';
    nameInput.value = state.versions[state.activeVersion].name;
    nameInput.title = 'Rename this version';
    nameInput.addEventListener('focus', () => pushHistory());
    nameInput.addEventListener('change', () => {
      const v = state.versions[state.activeVersion];
      v.name = nameInput.value.trim().slice(0,24) || v.name;
      render();
    });
    nameInput.addEventListener('keydown', e => { if(e.key==='Enter') nameInput.blur(); });
    bar.appendChild(nameInput);

    const dupBtn = document.createElement('button');
    dupBtn.className = 'version-btn';
    dupBtn.textContent = '+ Duplicate';
    dupBtn.title = 'Start a new version copied from the one you\'re viewing';
    dupBtn.addEventListener('click', () => {
      pushHistory();
      const src = state.versions[state.activeVersion];
      state.versions.push({ id:newId(), name: src.name + ' copy', shifts: cloneShifts(src.shifts) });
      state.activeVersion = state.versions.length-1;
      render();
    });
    bar.appendChild(dupBtn);

    const blankBtn = document.createElement('button');
    blankBtn.className = 'version-btn';
    blankBtn.textContent = '+ Blank';
    blankBtn.addEventListener('click', () => {
      pushHistory();
      state.versions.push({ id:newId(), name: 'Idea ' + (state.versions.length+1), shifts: defaultShifts() });
      state.activeVersion = state.versions.length-1;
      render();
    });
    bar.appendChild(blankBtn);

    if(state.versions.length > 1){
      const delBtn = document.createElement('button');
      delBtn.className = 'version-btn danger';
      delBtn.textContent = 'Delete';
      delBtn.title = 'Delete this version';
      delBtn.addEventListener('click', () => {
        pushHistory();
        const v = state.versions[state.activeVersion];
        state.versions = state.versions.filter(x => x.id !== v.id);
        if(state.activeVersion >= state.versions.length) state.activeVersion = state.versions.length-1;
        render();
      });
      bar.appendChild(delBtn);
    }

    const undoBtn = document.createElement('button');
    undoBtn.className = 'undo-btn';
    undoBtn.textContent = '↩ Undo';
    undoBtn.title = undoStack.length ? 'Undo the last change' : 'Nothing to undo yet';
    undoBtn.disabled = undoStack.length === 0;
    undoBtn.addEventListener('click', undo);
    bar.appendChild(undoBtn);
  }

  // ---------------- entry editor ----------------
  function renderEntryEditor(){
    const panel = document.getElementById('entryEditor');
    panel.innerHTML = '';

    currentShifts().forEach(shift => {
      const card = document.createElement('div');
      card.className = 'entry-shift';

      const head = document.createElement('div');
      head.className = 'entry-shift-head';

      const dot = document.createElement('span');
      dot.className = 'entry-dot';
      dot.style.background = shift.color;
      head.appendChild(dot);

      const labelInput = document.createElement('input');
      labelInput.type = 'text';
      labelInput.className = 'entry-label-input';
      labelInput.value = shift.label;
      labelInput.maxLength = 6;
      labelInput.addEventListener('focus', () => pushHistory());
      labelInput.addEventListener('change', () => {
        shift.label = labelInput.value.trim().slice(0,6) || shift.label;
        render();
      });
      head.appendChild(labelInput);

      const rmShift = document.createElement('button');
      rmShift.className = 'entry-shift-remove';
      rmShift.textContent = 'Remove shift';
      rmShift.addEventListener('click', () => {
        pushHistory();
        state.versions[state.activeVersion].shifts = currentShifts().filter(s => s.id !== shift.id);
        render();
      });
      head.appendChild(rmShift);

      card.appendChild(head);

      const sorted = [...shift.blocks].sort((a,b) => a.start-b.start);
      sorted.forEach(b => {
        const row = document.createElement('div');
        row.className = 'entry-row';

        const startInput = document.createElement('input');
        startInput.type = 'time';
        startInput.step = 1800;
        startInput.value = rowToTimeValue(b.start);
        startInput.addEventListener('focus', () => pushHistory());
        startInput.addEventListener('change', () => {
          const bounds = neighborBounds(shift, b.id, b.start, b.end);
          let newStart = timeValueToRow(startInput.value);
          if(newStart === null){ render(); return; }
          newStart = Math.max(bounds.minBound, Math.min(newStart, bounds.maxBound-1));
          if(newStart >= b.end){
            // start moved past the current end — push end to 2h after the new start
            b.end = Math.min(bounds.maxBound, newStart+4);
            if(b.end <= newStart) b.end = Math.min(ROWS, newStart+1);
          }
          b.start = newStart;
          render();
        });

        const dash = document.createElement('span');
        dash.className = 'dash';
        dash.textContent = '–';

        const endInput = document.createElement('input');
        endInput.type = 'time';
        endInput.step = 1800;
        endInput.value = rowToTimeValue(b.end);
        endInput.addEventListener('focus', () => pushHistory());
        endInput.addEventListener('change', () => {
          const bounds = neighborBounds(shift, b.id, b.start, b.end);
          let newEnd = timeValueToRow(endInput.value);
          if(newEnd === null){ render(); return; }
          newEnd = Math.min(bounds.maxBound, Math.max(newEnd, b.start+1));
          b.end = newEnd;
          render();
        });

        const rmRow = document.createElement('button');
        rmRow.className = 'entry-row-remove';
        rmRow.textContent = '×';
        rmRow.title = 'Remove this time range';
        rmRow.addEventListener('click', () => {
          pushHistory();
          shift.blocks = shift.blocks.filter(x => x.id !== b.id);
          render();
        });

        row.appendChild(startInput);
        row.appendChild(dash);
        row.appendChild(endInput);
        row.appendChild(rmRow);
        card.appendChild(row);
      });

      const addTimeBtn = document.createElement('button');
      addTimeBtn.className = 'entry-add-time';
      addTimeBtn.textContent = '+ Add time';
      addTimeBtn.addEventListener('click', () => {
        pushHistory();
        const s = [...shift.blocks].sort((a,b) => a.start-b.start);
        let start = s.length ? s[s.length-1].end : timeValueToRow('11:00');
        if(start >= ROWS) start = Math.max(0, ROWS-2);
        let end = Math.min(ROWS, start+2);
        if(end <= start){ start = Math.max(0, ROWS-2); end = ROWS; }
        shift.blocks.push({ id:newId(), start, end });
        render();
      });
      card.appendChild(addTimeBtn);

      panel.appendChild(card);
    });

    const addShiftBtn = document.createElement('button');
    addShiftBtn.className = 'entry-add-shift';
    addShiftBtn.textContent = '+ Add shift';
    addShiftBtn.addEventListener('click', () => {
      pushHistory();
      const label = nextLabel(currentShifts());
      const color = PALETTE[currentShifts().length % PALETTE.length];
      currentShifts().push({ id:newId(), label, color, blocks:[] });
      render();
    });
    panel.appendChild(addShiftBtn);
  }

  // ---------------- calendar (read-only visual) ----------------
  function renderBlock(b, shift){
    const el = document.createElement('div');
    el.className = 'block';
    el.style.top = (b.start*ROW_H)+'px';
    el.style.height = ((b.end-b.start)*ROW_H - 2)+'px';
    el.style.background = shift.color;
    el.textContent = fmtHours(b.end-b.start);
    el.title = minutesLabel(START_MIN+b.start*STEP) + '–' + minutesLabel(START_MIN+b.end*STEP) + ' · ' + fmtHours(b.end-b.start);
    return el;
  }

  function renderBreakSeg(seg){
    const el = document.createElement('div');
    el.className = 'break-seg';
    el.style.top = (seg.start*ROW_H)+'px';
    el.style.height = ((seg.end-seg.start)*ROW_H - 2)+'px';
    if(seg.end-seg.start >= 2){
      el.textContent = 'Break ' + fmtHours(seg.end-seg.start);
    }
    return el;
  }

  function render(){
    renderVersionTabs();
    renderEntryEditor();

    const container = document.getElementById('dayContainer');
    container.innerHTML = '';

    const dayEl = document.createElement('div');
    dayEl.className = 'day';

    const head = document.createElement('div');
    head.className = 'day-head';
    head.innerHTML = `<h2>Shift template</h2><span>${minutesLabel(START_MIN)} – ${minutesLabel(END_MIN)}</span>`;
    dayEl.appendChild(head);

    const gridArea = document.createElement('div');
    gridArea.className = 'grid-area';

    const gutter = document.createElement('div');
    gutter.className = 'gutter';
    gutter.style.height = (ROWS*ROW_H)+'px';
    gutter.style.marginTop = '26px';
    for(let r=0;r<=ROWS;r++){
      const lab = document.createElement('div');
      lab.className = 'lab';
      lab.style.top = (r*ROW_H)+'px';
      lab.textContent = minutesLabel(START_MIN + r*STEP);
      gutter.appendChild(lab);
    }
    gridArea.appendChild(gutter);

    const shiftCols = document.createElement('div');
    shiftCols.className = 'shift-cols';

    currentShifts().forEach(shift => {
      const col = document.createElement('div');
      col.className = 'shift-col';

      const shHead = document.createElement('div');
      shHead.className = 'shift-head';
      const labelEl = document.createElement('span');
      labelEl.className = 'shift-label';
      labelEl.style.background = shift.color;
      labelEl.textContent = shift.label;
      shHead.appendChild(labelEl);
      col.appendChild(shHead);

      const track = document.createElement('div');
      track.className = 'track';
      track.style.height = (ROWS*ROW_H)+'px';

      for(let r=2;r<ROWS;r+=2){
        const hl = document.createElement('div');
        hl.className = 'hour-line';
        hl.style.top = (r*ROW_H)+'px';
        track.appendChild(hl);
      }

      shift.blocks.forEach(b => track.appendChild(renderBlock(b, shift)));
      getBreakSegments(shift).forEach(seg => track.appendChild(renderBreakSeg(seg)));

      col.appendChild(track);

      const stats = document.createElement('div');
      stats.className = 'shift-stats';
      const {work, brk} = shiftHours(shift);
      stats.innerHTML = brk > 0
        ? `<span class="lbl">Work</span> <b>${fmtHours(work)}</b> · <span class="lbl">Break</span> <b>${fmtHours(brk)}</b>`
        : `<span class="lbl">Work</span> <b>${fmtHours(work)}</b>`;
      col.appendChild(stats);

      shiftCols.appendChild(col);
    });

    gridArea.appendChild(shiftCols);
    dayEl.appendChild(gridArea);
    container.appendChild(dayEl);

    scheduleSave();
  }

  function buildPrintArea(){
    const area = document.getElementById('printArea');
    const version = state.versions[state.activeVersion];
    let html = `<h2>${version.name}</h2><div class="rule"></div>`;

    currentShifts().forEach(shift => {
      const sorted = [...shift.blocks].sort((a,b) => a.start-b.start);
      const {work, brk} = shiftHours(shift);
      html += `<div class="shift-block"><div class="name">Shift ${shift.label}</div>`;
      if(sorted.length === 0){
        html += `<div class="line">(no times set)</div>`;
      } else {
        sorted.forEach(b => {
          html += `<div class="line">${minutesLabel(START_MIN+b.start*STEP)} – ${minutesLabel(START_MIN+b.end*STEP)}</div>`;
        });
      }
      html += `<div class="line totals">Work ${fmtHours(work)}${brk>0 ? ' · Break '+fmtHours(brk) : ''}</div>`;
      html += `</div>`;
    });

    html += `<div class="rule"></div>`;
    area.innerHTML = html;
  }

  document.getElementById('printBtn').addEventListener('click', () => {
    buildPrintArea();
    window.print();
  });

  render();
  listenForRemoteChanges();
})();
</script>
